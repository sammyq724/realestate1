<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashCards</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --card-front: #16213e;
      --card-back: #0f3460;
      --accent: #e94560;
      --accent2: #533483;
      --text: #eaeaea;
      --text-muted: #888;
      --border: #2a2a4a;
      --radius: 16px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ── Buttons ── */
    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 9px 18px;
      transition: opacity .15s, transform .1s;
    }
    button:hover { opacity: .85; }
    button:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-icon { background: transparent; color: var(--text-muted); font-size: 1.4rem; padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; }
    .btn-icon:hover { color: var(--text); border-color: var(--accent); }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
      gap: 28px;
    }

    /* ── Deck selector ── */
    .deck-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 18px;
      width: 100%;
      max-width: 820px;
      flex-wrap: wrap;
    }
    .deck-bar label { font-size: .8rem; color: var(--text-muted); white-space: nowrap; }
    .deck-bar select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: .9rem;
      flex: 1;
      min-width: 180px;
      cursor: pointer;
    }
    .progress-wrap { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .progress-label { font-size: .8rem; color: var(--text-muted); white-space: nowrap; }
    .progress-bar-outer {
      width: 120px;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width .3s;
    }

    /* ── Flashcard ── */
    .card-scene {
      width: 100%;
      max-width: 700px;
      height: 380px;
      perspective: 1200px;
    }
    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .55s cubic-bezier(.4,0,.2,1);
      cursor: pointer;
      user-select: none;
    }
    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      gap: 16px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .card-front { background: var(--card-front); }
    .card-back  { background: var(--card-back); transform: rotateY(180deg); }

    .card-hint {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: .7rem;
      color: var(--text-muted);
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .card-counter {
      position: absolute;
      top: 14px;
      left: 18px;
      font-size: .75rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .card-label {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--accent);
      font-weight: 700;
    }
    .card-term {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .card-image {
      width: 100%;
      max-height: 140px;
      object-fit: contain;
      border-radius: 10px;
    }
    .card-definition {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #cce;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .btn-nav {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .btn-nav:hover { border-color: var(--accent); color: var(--accent); }
    .btn-flip {
      padding: 12px 32px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      border-radius: 99px;
      font-size: 1rem;
    }

    /* ── Shuffle / star row ── */
    .meta-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .starred { color: gold !important; border-color: gold !important; }

    /* ── Quiz mode ── */
    #quiz-section {
      display: none;
      width: 100%;
      max-width: 700px;
      flex-direction: column;
      gap: 20px;
    }
    #quiz-section.active { display: flex; }
    .quiz-question {
      background: var(--card-front);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
    }
    .quiz-question h2 { font-size: 1.6rem; margin-bottom: 8px; }
    .quiz-question p  { color: var(--text-muted); font-size: .9rem; }
    .quiz-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .quiz-opt {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      font-size: 1rem;
      color: var(--text);
      text-align: left;
      transition: border-color .15s;
    }
    .quiz-opt:hover:not(:disabled) { border-color: var(--accent2); }
    .quiz-opt.correct  { border-color: #2ecc71; background: #0d2e1a; color: #2ecc71; }
    .quiz-opt.wrong    { border-color: var(--accent); background: #2e0d15; color: var(--accent); }
    .quiz-feedback {
      text-align: center;
      font-size: 1rem;
      min-height: 1.5em;
    }
    .quiz-score {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      display: none;
    }
    .quiz-score h2 { font-size: 1.8rem; margin-bottom: 8px; }
    .quiz-score p  { color: var(--text-muted); }
    .score-num { font-size: 3rem; font-weight: 700; color: var(--accent); }

    /* ── Card list panel ── */
    #list-section {
      display: none;
      width: 100%;
      max-width: 820px;
      flex-direction: column;
      gap: 12px;
    }
    #list-section.active { display: flex; }
    .list-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .list-item:hover { border-color: var(--accent2); }
    .list-num { color: var(--accent); font-weight: 700; min-width: 28px; padding-top: 2px; }
    .list-term { font-weight: 700; font-size: 1rem; }
    .list-def  { font-size: .9rem; color: var(--text-muted); margin-top: 4px; }
    .list-img  { width: 64px; height: 48px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h2 { font-size: 1.3rem; }
    .modal label { font-size: .8rem; color: var(--text-muted); display: block; margin-bottom: 4px; }
    .modal input, .modal textarea {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: .95rem;
      font-family: inherit;
      resize: vertical;
    }
    .modal textarea { min-height: 80px; }
    .modal input:focus, .modal textarea:focus {
      outline: none;
      border-color: var(--accent2);
    }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .card-entry {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }
    .card-entry-row { display: flex; gap: 10px; }
    .card-entry-row > * { flex: 1; }
    .remove-card-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: transparent;
      color: var(--text-muted);
      border: none;
      font-size: 1rem;
      padding: 2px 6px;
      border-radius: 6px;
    }
    .remove-card-btn:hover { color: var(--accent); }
    #cards-builder { display: flex; flex-direction: column; gap: 10px; max-height: 320px; overflow-y: auto; }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
    }
    .tab {
      padding: 8px 18px;
      border-radius: 7px;
      background: transparent;
      color: var(--text-muted);
      font-size: .875rem;
    }
    .tab.active { background: var(--accent2); color: #fff; }

    /* ── Mode sections wrapper ── */
    #study-section { display: flex; flex-direction: column; align-items: center; gap: 28px; width: 100%; }
    #study-section.hidden { display: none; }
  </style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div class="logo">Flash<span>Cards</span></div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('study')">Study</button>
    <button class="tab" onclick="switchTab('quiz')">Quiz</button>
    <button class="tab" onclick="switchTab('list')">Browse</button>
  </div>
  <div class="header-actions">
    <button class="btn-secondary" onclick="openNewDeck()">+ New Deck</button>
  </div>
</header>

<!-- ══ MAIN ══ -->
<main>

  <!-- Deck bar -->
  <div class="deck-bar">
    <label>Deck</label>
    <select id="deck-select" onchange="loadDeck()"></select>
    <div class="progress-wrap">
      <span class="progress-label" id="progress-label">0 / 0</span>
      <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar" style="width:0%"></div></div>
    </div>
  </div>

  <!-- ── Study mode ── -->
  <div id="study-section">
    <div class="card-scene">
      <div class="card" id="card" onclick="flipCard()">
        <div class="card-face card-front">
          <span class="card-counter" id="card-counter">1 / 1</span>
          <span class="card-hint">click to flip</span>
          <div class="card-label">Term</div>
          <div class="card-term" id="card-term">Loading…</div>
        </div>
        <div class="card-face card-back">
          <span class="card-hint">click to flip back</span>
          <div class="card-label">Definition</div>
          <img class="card-image" id="card-image" src="" alt="" style="display:none" />
          <div class="card-definition" id="card-definition"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-nav btn-icon" onclick="prevCard()" title="Previous">&#8592;</button>
      <button class="btn-flip" onclick="flipCard()">Flip</button>
      <button class="btn-nav btn-icon" onclick="nextCard()" title="Next">&#8594;</button>
    </div>

    <div class="meta-row">
      <button class="btn-icon" id="star-btn" onclick="toggleStar()" title="Star this card">&#9733;</button>
      <button class="btn-secondary" onclick="shuffleDeck()">&#128256; Shuffle</button>
      <button class="btn-secondary" onclick="resetDeck()">&#8635; Restart</button>
      <button class="btn-secondary" id="starred-only-btn" onclick="toggleStarredOnly()">&#9733; Starred only</button>
    </div>
  </div>

  <!-- ── Quiz mode ── -->
  <div id="quiz-section">
    <div class="quiz-question">
      <p style="margin-bottom:12px;color:var(--text-muted);font-size:.8rem">Question <span id="q-num">1</span> of <span id="q-total">0</span></p>
      <h2 id="q-term">—</h2>
      <p id="q-subtitle" style="margin-top:8px"></p>
    </div>
    <div class="quiz-options" id="quiz-options"></div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
    <div class="quiz-score" id="quiz-score">
      <div class="score-num" id="score-num">0</div>
      <h2>Quiz Complete!</h2>
      <p id="score-msg"></p>
      <br>
      <button class="btn-primary" onclick="startQuiz()">Try Again</button>
    </div>
  </div>

  <!-- ── List / browse mode ── -->
  <div id="list-section"></div>

</main>

<!-- ══ NEW DECK MODAL ══ -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2 id="modal-title">New Deck</h2>
    <div>
      <label>Deck name</label>
      <input type="text" id="deck-name-input" placeholder="e.g. Biology Chapter 3" />
    </div>
    <div id="cards-builder"></div>
    <button class="btn-secondary" onclick="addCardEntry()">+ Add Card</button>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveDeck()">Save Deck</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  DATA
// ═══════════════════════════════════════
const STORAGE_KEY = 'flashcards_decks_v1';
const STARS_KEY   = 'flashcards_stars_v1';

const defaultDecks = [
  {
    id: '7a_construction',
    name: '7A — Construction Issues',
    cards: [
      { term: 'Specifications', definition: 'Description of quality of building.', image: '' },
      { term: 'Drawings / Blueprints', definition: 'Describe quantities and physical designs of a building.', image: '' },
      { term: 'Full Basement', definition: 'Entire house sits over a full underground level.', image: 'images/notion1.png' },
      { term: 'Crawlspace', definition: 'House raised slightly; short space underneath.', image: 'images/notion2.png' },
      { term: 'Slab on Grade', definition: 'House sits directly on a concrete slab; no basement.', image: 'images/notion3.png' },
      { term: 'Footing', definition: 'Concrete base in the soil that spreads the building\'s weight.', image: 'images/notion4.png' },
      { term: 'Sill Plate', definition: 'First wood board on top of foundation; walls are nailed to it.', image: 'images/sillplate.png' },
      { term: 'Girder', definition: 'Main horizontal beam that supports floors.', image: 'images/girder.png' },
      { term: 'Lally Column', definition: 'Round steel/concrete column holding up the girder.', image: 'images/lallycol.png' },
      { term: 'Ridge Beam', definition: 'Beam at the peak of the roof running down the center.', image: 'images/ridgebeam.png' },
      { term: 'Sheathing', definition: 'Flat boards on the roof frame; base for shingles, blocks water.', image: 'images/sheathing.png' },
      { term: 'Flashing', definition: 'Metal pieces that seal gaps (chimney, roof joints).', image: 'images/flashing.png' },
      { term: 'Pitch / Rafters', definition: 'Pitch = roof slope; rafters = angled roof supports.', image: 'images/pitch.png' },
      { term: 'Fascia', definition: 'Horizontal board at roof edge; protects ends of rafters.', image: 'images/fascia.png' },
      { term: 'Eave', definition: 'Roof overhang past the wall.', image: 'images/eave.png' },
      { term: 'Soffit', definition: 'Underside of the eave.', image: 'images/soffit.png' },
      { term: 'Bearing Wall', definition: 'Carries weight from above down to foundation.', image: 'images/bearing.png' },
      { term: 'Curtain Wall', definition: 'Exterior wall that carries no structural weight.', image: 'images/curtain.png' },
      { term: 'Header', definition: 'Horizontal beam over doors/windows that supports weight above.', image: 'images/headerr.png' },
      { term: 'R Value', definition: 'Resistance — measurement of the ability of insulation to slow the transfer of heat or cold. Higher the better. The higher your R value, the more important the ventilation system is.', image: '' },
      { term: 'Building Envelope', definition: 'Massing or bulk of a building, typically defined by building walls.', image: '' },
      { term: 'Duct', definition: 'Flexible ventilation metal pipe.', image: '' },
      { term: 'Forced Air System', definition: 'Delivers warm and cold air through the same ducts.', image: '' },
      { term: 'British Thermal Unit (BTU)', definition: 'The amount of heat energy needed to raise the temperature of one pound of water by one degree.', image: '' },
      { term: 'Copper Pipes', definition: 'Used for hot+cold water supply. Durable, code-approved.', image: '' },
      { term: 'Brass', definition: 'Used for valves, fittings, meters — not full pipe runs. Strong, corrosion resistant.', image: '' },
      { term: 'Lead Pipes', definition: 'Old water service pipes. No longer allowed.', image: '' },
      { term: 'Cast Iron', definition: 'Not for clean water. Used for drain, waste, and vent systems in older NYC buildings.', image: '' },
      { term: 'PVC', definition: 'Drain, waste, vent in newer construction. Not allowed for water supply. Can\'t carry clean water.', image: '' },
      { term: 'Volts', definition: 'Pressure of current.', image: '' },
      { term: 'Amps', definition: 'Amount of charge.', image: '' },
      { term: 'NYS General Business Law 36A', definition: 'Money received by contractor from homeowner, if large enough, should be held in escrow.', image: '' },
      { term: 'NYS General Business Law 36B', definition: 'Provides a warranty period for new construction: 1 year for workmanship, 2 years for trades (plumbing/HVAC), 6 years for material defects.', image: '' },
      { term: 'Warranty', definition: 'A legal assurance that a product or work meets certain standards for a defined time period. Specifies what\'s covered, for how long, and exclusions.', image: '' },
      { term: 'Guarantee', definition: 'A promise of performance or satisfaction. If it fails, the seller will fix, replace, or refund. Often short-term and marketing-driven.', image: '' },
      { term: 'Fuse', definition: 'A one-time safety device.', image: '' },
      { term: 'Circuit Breaker', definition: 'A resettable safety switch. If overloaded, it trips off and can be reset. Standard in modern buildings.', image: '' },
      { term: 'Joists', definition: 'Horizontal timbers, beams or bars supporting a floor.', image: 'images/joists.png' },
      { term: 'Percolation Rate', definition: 'The rate, usually expressed as inches per hour or inches per day, at which water moves through soil.', image: '' },
      { term: 'Studs', definition: 'Vertical framing members found in wall construction. Typically placed 12", 16" or 24" on center.', image: 'images/studs.png' },
      { term: 'Post and Beam Construction', definition: 'Large vertical posts and horizontal beams carry the load. Few interior walls needed. Common in older buildings and custom structures.', image: 'images/pbcon.png' },
      { term: 'Core and Shell Construction', definition: 'Developer builds the structure + exterior + core systems (elevators, stairs, HVAC shafts). Interior build-out is done later by tenants. Common in office buildings.', image: 'images/csconst.png' },
      { term: 'Balloon Construction', definition: 'Wall studs run continuously from foundation to roof. Fire spreads easily. No longer used due to fire risk.', image: 'images/balloon.png' },
      { term: 'Platform Construction', definition: 'Each floor is built as a separate platform, then walls go up on top. Fire-stops naturally at each floor. Most common modern method.', image: 'images/lasttt.png' },
    ]
  }
];

function loadStorage() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
}
function saveStorage(decks) { localStorage.setItem(STORAGE_KEY, JSON.stringify(decks)); }
function loadStars() { try { return JSON.parse(localStorage.getItem(STARS_KEY)) || {}; } catch { return {}; } }
function saveStars(s) { localStorage.setItem(STARS_KEY, JSON.stringify(s)); }

function getAllDecks() { return [...defaultDecks, ...loadStorage()]; }

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let currentDeckId   = defaultDecks[0].id;
let currentCards    = [];
let currentIndex    = 0;
let isFlipped       = false;
let starredOnly     = false;
let stars           = loadStars();
let currentTab      = 'study';

// quiz state
let quizCards = [];
let quizIndex = 0;
let quizScore = 0;
let quizAnswered = false;

// ═══════════════════════════════════════
//  DECK SELECT
// ═══════════════════════════════════════
function populateDeckSelect() {
  const sel = document.getElementById('deck-select');
  const all = getAllDecks();
  sel.innerHTML = all.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
  sel.value = currentDeckId;
}

function loadDeck() {
  currentDeckId = document.getElementById('deck-select').value;
  const deck = getAllDecks().find(d => d.id === currentDeckId);
  starredOnly = false;
  document.getElementById('starred-only-btn').classList.remove('starred');
  currentCards = deck ? [...deck.cards] : [];
  currentIndex = 0;
  if (currentTab === 'study') renderCard();
  if (currentTab === 'quiz')  startQuiz();
  if (currentTab === 'list')  renderList();
}

// ═══════════════════════════════════════
//  STUDY MODE
// ═══════════════════════════════════════
function getDisplayCards() {
  if (!starredOnly) return currentCards;
  const sid = starKey(currentDeckId);
  return currentCards.filter((_, i) => stars[sid] && stars[sid][i]);
}

function starKey(deckId) { return `deck_${deckId}`; }

function renderCard() {
  const cards = getDisplayCards();
  const total = cards.length;
  if (total === 0) {
    document.getElementById('card-term').textContent = 'No cards';
    document.getElementById('card-definition').textContent = '';
    document.getElementById('card-counter').textContent = '0 / 0';
    document.getElementById('progress-label').textContent = '0 / 0';
    document.getElementById('progress-bar').style.width = '0%';
    document.getElementById('card-image').style.display = 'none';
    return;
  }
  if (currentIndex >= total) currentIndex = total - 1;
  const c = cards[currentIndex];
  document.getElementById('card-term').textContent = c.term;
  document.getElementById('card-definition').textContent = c.definition;
  const img = document.getElementById('card-image');
  if (c.image) {
    img.src = c.image;
    img.style.display = 'block';
    img.onerror = () => { img.style.display = 'none'; };
  } else {
    img.style.display = 'none';
  }
  document.getElementById('card-counter').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progress-label').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / total) * 100}%`;

  // star button
  const sid = starKey(currentDeckId);
  const isStarred = stars[sid] && stars[sid][currentIndex];
  document.getElementById('star-btn').classList.toggle('starred', !!isStarred);

  // un-flip
  if (isFlipped) { isFlipped = false; document.getElementById('card').classList.remove('flipped'); }
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
}

function nextCard() {
  const len = getDisplayCards().length;
  if (!len) return;
  currentIndex = (currentIndex + 1) % len;
  renderCard();
}

function prevCard() {
  const len = getDisplayCards().length;
  if (!len) return;
  currentIndex = (currentIndex - 1 + len) % len;
  renderCard();
}

function shuffleDeck() {
  for (let i = currentCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [currentCards[i], currentCards[j]] = [currentCards[j], currentCards[i]];
  }
  currentIndex = 0;
  renderCard();
}

function resetDeck() {
  const deck = getAllDecks().find(d => d.id === currentDeckId);
  currentCards = deck ? [...deck.cards] : [];
  currentIndex = 0;
  renderCard();
}

function toggleStar() {
  const sid = starKey(currentDeckId);
  if (!stars[sid]) stars[sid] = {};
  stars[sid][currentIndex] = !stars[sid][currentIndex];
  saveStars(stars);
  document.getElementById('star-btn').classList.toggle('starred', !!stars[sid][currentIndex]);
}

function toggleStarredOnly() {
  starredOnly = !starredOnly;
  currentIndex = 0;
  document.getElementById('starred-only-btn').classList.toggle('starred', starredOnly);
  renderCard();
}

// ═══════════════════════════════════════
//  QUIZ MODE
// ═══════════════════════════════════════
function startQuiz() {
  quizCards = shuffle([...currentCards]);
  quizIndex = 0;
  quizScore = 0;
  quizAnswered = false;
  document.getElementById('quiz-score').style.display = 'none';
  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('q-total').textContent = quizCards.length;
  renderQuizQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderQuizQuestion() {
  if (quizIndex >= quizCards.length) { showQuizScore(); return; }
  const q = quizCards[quizIndex];
  document.getElementById('q-num').textContent = quizIndex + 1;
  document.getElementById('q-term').textContent = q.term;
  document.getElementById('q-subtitle').textContent = 'Choose the correct definition:';
  quizAnswered = false;
  document.getElementById('quiz-feedback').textContent = '';

  // Build 4 options: 1 correct + 3 distractors
  const others = currentCards.filter(c => c.term !== q.term);
  const distractors = shuffle([...others]).slice(0, 3);
  const options = shuffle([q, ...distractors]);

  const container = document.getElementById('quiz-options');
  container.innerHTML = options.map((o, i) =>
    `<button class="quiz-opt" onclick="answerQuiz(this,'${escQ(o.term)}','${escQ(q.term)}')">${o.definition}</button>`
  ).join('');
}

function escQ(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function answerQuiz(btn, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(b => b.disabled = true);

  if (chosen === correct) {
    btn.classList.add('correct');
    quizScore++;
    document.getElementById('quiz-feedback').textContent = '✓ Correct!';
    document.getElementById('quiz-feedback').style.color = '#2ecc71';
  } else {
    btn.classList.add('wrong');
    // highlight correct
    opts.forEach(b => {
      if (b.onclick && b.getAttribute('onclick') && b.getAttribute('onclick').includes(`'${correct}'`)) b.classList.add('correct');
    });
    document.getElementById('quiz-feedback').textContent = `✗ The correct answer was highlighted in green.`;
    document.getElementById('quiz-feedback').style.color = 'var(--accent)';
  }
  setTimeout(() => { quizIndex++; renderQuizQuestion(); }, 1400);
}

function showQuizScore() {
  const pct = quizCards.length ? Math.round((quizScore / quizCards.length) * 100) : 0;
  document.getElementById('quiz-options').innerHTML = '';
  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('score-num').textContent = `${pct}%`;
  document.getElementById('score-msg').textContent =
    `You got ${quizScore} out of ${quizCards.length} correct.${pct === 100 ? ' Perfect! 🎉' : pct >= 70 ? ' Great job!' : ' Keep studying!'}`;
  document.getElementById('quiz-score').style.display = 'block';
}

// ═══════════════════════════════════════
//  LIST MODE
// ═══════════════════════════════════════
function renderList() {
  const el = document.getElementById('list-section');
  if (!currentCards.length) { el.innerHTML = '<p style="color:var(--text-muted)">No cards in this deck.</p>'; return; }
  el.innerHTML = currentCards.map((c, i) => `
    <div class="list-item">
      <div class="list-num">${i + 1}</div>
      ${c.image ? `<img class="list-img" src="${c.image}" alt="" onerror="this.style.display='none'"/>` : ''}
      <div>
        <div class="list-term">${escHTML(c.term)}</div>
        <div class="list-def">${escHTML(c.definition)}</div>
      </div>
    </div>
  `).join('');
}

function escHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════
//  TABS
// ═══════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['study','quiz','list'][i] === tab);
  });
  document.getElementById('study-section').classList.toggle('hidden', tab !== 'study');
  document.getElementById('quiz-section').classList.toggle('active', tab === 'quiz');
  document.getElementById('list-section').classList.toggle('active', tab === 'list');

  if (tab === 'quiz') startQuiz();
  if (tab === 'list') renderList();
}

// ═══════════════════════════════════════
//  NEW DECK MODAL
// ═══════════════════════════════════════
function openNewDeck() {
  document.getElementById('deck-name-input').value = '';
  document.getElementById('cards-builder').innerHTML = '';
  document.getElementById('modal-title').textContent = 'New Deck';
  addCardEntry(); addCardEntry();
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function addCardEntry() {
  const builder = document.getElementById('cards-builder');
  const div = document.createElement('div');
  div.className = 'card-entry';
  div.innerHTML = `
    <button class="remove-card-btn" onclick="this.parentElement.remove()" title="Remove">✕</button>
    <div class="card-entry-row">
      <div><label>Term</label><input type="text" class="ce-term" placeholder="Term" /></div>
      <div><label>Definition</label><input type="text" class="ce-def" placeholder="Definition" /></div>
    </div>
    <div><label>Image URL (optional)</label><input type="url" class="ce-img" placeholder="https://…" /></div>
  `;
  builder.appendChild(div);
  div.querySelector('.ce-term').focus();
}

function saveDeck() {
  const name = document.getElementById('deck-name-input').value.trim();
  if (!name) { alert('Please enter a deck name.'); return; }

  const entries = document.querySelectorAll('.card-entry');
  const cards = [];
  entries.forEach(e => {
    const term = e.querySelector('.ce-term').value.trim();
    const def  = e.querySelector('.ce-def').value.trim();
    const img  = e.querySelector('.ce-img').value.trim();
    if (term && def) cards.push({ term, definition: def, image: img });
  });
  if (cards.length === 0) { alert('Add at least one card with a term and definition.'); return; }

  const existing = loadStorage();
  const id = 'user_' + Date.now();
  existing.push({ id, name, cards });
  saveStorage(existing);

  closeModal();
  currentDeckId = id;
  populateDeckSelect();
  loadDeck();
}

// ═══════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════
document.addEventListener('keydown', e => {
  if (document.getElementById('modal').classList.contains('open')) return;
  if (currentTab !== 'study') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft')  prevCard();
  if (e.key === 's' || e.key === 'S') toggleStar();
});

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
populateDeckSelect();
loadDeck();
</script>
</body>
</html>
